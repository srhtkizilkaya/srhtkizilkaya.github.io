<script>

  </a>`;

  const androidBtn = `<a class="store-btn store-btn-android" href="${android}">
    <img src="androidLogo.png" alt="Android" style="width:20px;height:20px;object-fit:contain;flex-shrink:0;">
    Get it on Google Play
  </a>`;

  if (isIOS) {
    btns.innerHTML = iosBtn;
  } else if (isAndroid) {
    btns.innerHTML = androidBtn;
  } else {
    btns.innerHTML = iosBtn + androidBtn;
  }
